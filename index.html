
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#09090b">
    <title>MesaFit - OS Alimentar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Regras Globais de Scrollbar Invisível */
        * {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
            -webkit-tap-highlight-color: transparent;
        }
        
        *::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
            background: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; /* Zinc 950 */
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Glassmorphism Dark */
        .glass-dark {
            background: rgba(9, 9, 11, 0.6); /* Zinc 950 com opacidade */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-panel {
            background: rgba(24, 24, 27, 0.4); /* Zinc 900 com opacidade */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .overflow-x-auto, .overflow-y-auto {
            -webkit-overflow-scrolling: touch;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slideUp {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes expand {
             from { clip-path: inset(100% 0 0 0); }
             to { clip-path: inset(0 0 0 0); }
        }

        /* Light Theme Overrides */
        body.light-theme {
            background-color: #ffffff !important;
            color: #09090b !important;
        }
        body.light-theme .bg-\[\#09090b\] {
            background-color: #ffffff !important;
        }
        body.light-theme .bg-\[\#18181b\] {
            background-color: #f4f4f5 !important;
        }
        body.light-theme .text-white {
            color: #09090b !important;
        }
        body.light-theme .text-gray-300 {
            color: #3f3f46 !important;
        }
        body.light-theme .text-gray-400 {
            color: #52525b !important;
        }
        body.light-theme .text-gray-500 {
            color: #71717a !important;
        }
        body.light-theme .bg-white\/5 {
            background-color: rgba(0, 0, 0, 0.05) !important;
        }
        body.light-theme .bg-white\/10 {
            background-color: rgba(0, 0, 0, 0.1) !important;
        }
        body.light-theme .bg-black\/20 {
            background-color: rgba(0, 0, 0, 0.03) !important;
        }
        body.light-theme .bg-black\/30 {
            background-color: rgba(0, 0, 0, 0.04) !important;
        }
        body.light-theme .bg-black\/40 {
            background-color: rgba(0, 0, 0, 0.05) !important;
        }
        body.light-theme .border-white\/5 {
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
        body.light-theme .border-white\/10 {
            border-color: rgba(0, 0, 0, 0.15) !important;
        }
        body.light-theme .bg-zinc-700 {
            background-color: #d4d4d8 !important;
        }
        body.light-theme .bg-zinc-800 {
            background-color: #e4e4e7 !important;
        }
        body.light-theme .bg-zinc-900 {
            background-color: #f4f4f5 !important;
        }
        body.light-theme .glass-dark {
            background: rgba(255, 255, 255, 0.8) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
        body.light-theme .glass-panel {
            background: rgba(244, 244, 245, 0.8) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
        body.light-theme .shadow-white\/5 {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03) !important;
        }
        body.light-theme .shadow-white\/20 {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
